name: Build Snob Infra Image

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    name: Build and push infra image
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ------------------------------------------------------------
      # Set up Docker Buildx
      # ------------------------------------------------------------
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      # ------------------------------------------------------------
      # Login to GHCR
      # ------------------------------------------------------------
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------
      # Build and push infra image
      # ------------------------------------------------------------
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        id: build
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/piqule-infra:latest

      # ------------------------------------------------------------
      # Update pinned digest in config template when image changes
      # ------------------------------------------------------------
      - name: Update image digest in config
        run: |
          NEW_DIGEST="${{ steps.build.outputs.digest }}"
          FILES=(
            "templates/always/.piqule/config.yaml"
            ".piqule/config.yaml"
            ".piqule/_docker.sh"
          )
          OLD_DIGEST=$(grep -o 'sha256:[a-f0-9]*' "${FILES[0]}" | head -1)
          if [ -z "$OLD_DIGEST" ]; then
            echo "::error::Could not extract existing digest from ${FILES[0]}"
            exit 1
          fi
          if [ -z "$NEW_DIGEST" ]; then
            echo "::error::Build step did not produce a digest"
            exit 1
          fi
          if [ "$OLD_DIGEST" != "$NEW_DIGEST" ]; then
            BRANCH="auto-digest-${NEW_DIGEST:7:12}"
            git push origin --delete "$BRANCH" 2>/dev/null || true
            for file in "${FILES[@]}"; do
              sed -i "s|$OLD_DIGEST|$NEW_DIGEST|" "$file"
            done
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add "${FILES[@]}"
            git commit -m "Update infra image digest to ${NEW_DIGEST:0:19}"
            git push -u origin "$BRANCH"
            # Close stale digest PRs before creating a new one
            gh pr list \
              --author "app/github-actions" \
              --label "dependencies" \
              --search "Update infra image digest" \
              --json number \
              --jq '.[].number' | while read -r old_pr; do
              gh pr close "$old_pr" --delete-branch \
                --comment "Superseded by a newer digest update" || true
            done
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Update infra image digest" \
              --body "Auto-generated: pin digest to ${NEW_DIGEST:0:19}" \
              --label "dependencies") || {
              echo "::error::Failed to create PR"
              exit 1
            }
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            if [ -z "$PR_NUMBER" ]; then
              echo "::error::Could not parse PR number from: $PR_URL"
              exit 1
            fi
            gh pr merge "$PR_NUMBER" --auto --merge --delete-branch
          fi
        env:
          GH_TOKEN: ${{ secrets.PUSH_TOKEN }}
