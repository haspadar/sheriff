override:
  phpmetrics.coupling.max_afferent: 35
  phpmetrics.coupling.max_efferent: 25
  php.versions: ["8.3", "8.4", "8.5"]
  ci.sheriff_bin: bin/sheriff
  sonar.organization: haspadar-org
  sonar.projectKey: haspadar_sheriff
  infection.min_msi: 80.0
  infection.min_covered_msi: 90.0
  coverage.project.target: 85
  coverage.project.threshold: 1
  coverage.patch.target: 85
  coverage.patch.threshold: 1
  psalm.project.files:
    - "../../bin/sheriff"
    - "../../bin/sheriff-check"
    - "../../bin/sheriff-fix"
    - "../../bin/sheriff-sync"
    - "../../bin/sheriff-tokens-check"

append:
  infra.exclude:
    - templates
  phpstan.parameters:
    haspadar:
      afferentCoupling:
        # Value-object classes excluded until afferentCoupling becomes path-aware
        # so it ignores incoming references from tests/.
        # Tracked in haspadar/phpstan-rules#230.
        excludedClasses:
          - '\Haspadar\Sheriff\SheriffException'
          - '\Haspadar\Sheriff\File\TextFile'
          - '\Haspadar\Sheriff\Settings\Value\BoolValue'
          - '\Haspadar\Sheriff\Settings\Value\IntValue'
          - '\Haspadar\Sheriff\Settings\Value\ListValue'
          - '\Haspadar\Sheriff\Settings\Value\StringValue'
          - '\Haspadar\Sheriff\Settings\Value\TreeValue'
