name: Sheriff

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # INFRA CHECKS
  # ============================================================
  infra:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        check:
{% EnabledTools(ci.infra_checks)|EachFormatted("          - %s")|Joined("\n") %}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: shivammathur/setup-php@690cb7c9d81dbfe51eba732cfca0a00ca42db777
        with:
          php-version: {% ListText(php.versions)|First() %}

{% EnvsText(envs, "      ") %}
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run check
        run: {% StringText(ci.sheriff_bin) %} check ${{ matrix.check }}


  # ============================================================
  # PHP STATIC ANALYSIS
  # ============================================================
  php-static:
    name: ${{ matrix.check }} (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        php: [{% ListText(php.versions)|EachFormatted('"%s"')|Joined(", ") %}]
        check:
{% EnabledTools(ci.php_checks)|EachFormatted("          - %s")|Joined("\n") %}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: shivammathur/setup-php@690cb7c9d81dbfe51eba732cfca0a00ca42db777
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, json

{% EnvsText(envs, "      ") %}
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run static check
        run: {% StringText(ci.sheriff_bin) %} check ${{ matrix.check }}


  # ============================================================
  # PHP TESTS + COVERAGE + MUTATION
  # ============================================================
  php-tests:
    name: Tests / Coverage / Mutation (PHP {% ListText(php.versions)|First() %})
    runs-on: ubuntu-latest
    needs: php-static
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: shivammathur/setup-php@690cb7c9d81dbfe51eba732cfca0a00ca42db777
        with:
          php-version: {% ListText(php.versions)|First() %}
          coverage: xdebug
          extensions: mbstring, dom, json

{% EnvsText(envs, "      ") %}
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # ------------------------------------------------------------
      # PHPUnit (if config exists)
      # ------------------------------------------------------------
      - name: PHPUnit (coverage)
        if: hashFiles('.sheriff/phpunit/phpunit.xml') != ''
        run: bash .sheriff/phpunit/command.sh

      # ------------------------------------------------------------
      # Upload coverage to Codecov (if coverage exists)
      # ------------------------------------------------------------
      - name: Upload coverage to Codecov
        if: {% BoolText(codecov.cloud) %} == true && hashFiles('.sheriff/codecov/coverage.xml') != ''
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: .sheriff/codecov/coverage.xml
          fail_ci_if_error: true
          use_pypi: true

      # ------------------------------------------------------------
      # Infection (if config exists)
      # ------------------------------------------------------------
      - name: Infection
        if: hashFiles('.sheriff/infection/infection.json5') != ''
        env:
          INFECTION_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}
        run: bash .sheriff/infection/command.sh
